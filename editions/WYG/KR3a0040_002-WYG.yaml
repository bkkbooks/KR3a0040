body:
  text: 袁氏世範卷中宋袁采撰處己人之智識固有髙下又有髙下殊絶者髙之見下如登髙望逺無不盡見下之視髙如在牆外欲窺牆裏若髙下相去差近猶可與語若相去逺甚不如勿告徒費口煩舌爾譬如奕棋若髙􅊠止較三五着尚可對奕國手與未識籌局之人對奕果如何哉富貴乃命分偶然豈宜以此驕傲郷曲若本自貧窶身致富厚本自寒素身致通顯此雖人之所謂賢亦不可以此取尤於鄉曲若因父祖之遺資而坐享肥濃因父祖之保任而馴致通顯此何以異於常人其間有欲以此驕傲鄉曲不亦羞而可憐哉世有無知之人不能一概禮待鄉曲而因人之富貴貧賤設為髙下等級見有資財有官職者則禮恭而心敬資財愈多官職愈髙則恭敬又加焉至視貧者賤者則禮傲而心慢曽不少顧䘏殊不知彼之富貴非吾之榮彼之貧賤非我之辱何用髙下分别如此長厚有識君子必不然也操履與升沉自是兩塗不可謂操履之正自宜榮貴操履不正自宜困阨若如此則孔顔應為宰輔而古今宰輔逹官不復小人矣蓋操履自是吾人當行之事不可以此責效於外物責效不效則操履必怠而所守或變遂為小人之歸矣今世間多有愚蠢而享富厚智慧而居貧寒者皆有一定之分不可致詰若知此理安而處之豈不省事世事多更變乃天理如此今世人往往見目前稍稍榮盛以為此生無足慮不旋踵而破壞者多矣大抵天序十年一換甲則世事一變今不須廣論久逺只以鄉曲十年前二十年前比論目前其成敗興衰何嘗有定勢世人無逺識凡見他人興進及有如意事則懷妬見他人衰退及有不如意事則譏笑同居及同鄉人最多此患若知事無定勢則自慮之不暇何暇妬人笑人哉膺髙年享富貴之人必須少壯之時嘗盡艱難受盡辛苦不曾有自少壯享富貴安逸至老者早年登科及早年受奏補之人必於中年齟齬不如意却於暮年方得榮逹或仕宧無齟齬必其生事窘薄憂飢寒慮婚嫁若早年宧逹不歴艱難辛苦及承父祖生事之厚更無不如意者多不獲高壽造物乘除之理類多如此其間亦有始終享富貴者乃是有大福之人亦千萬人中間有之非可常也今人往往機心巧謀皆欲不受辛苦即享富貴至終身蓋不知此理而又非理計較欲其子孫自少小安然享大富貴尤其蔽惑也終於人力不能勝天富貴自有定分造物者既設為一定之分又設為不測之機役使天下之人朝夕奔趨老死而不覺不如是則人生天地間全然無事而造化之術窮矣然奔趨而得者不過一二奔趨而不得者蓋千萬人世人終以一二者之故至於勞心費力老死無成者多矣不知他人奔趨而得亦其定分中所有者若定分中所有雖不奔趨遲以歲月亦終必得故世有高見逺識超出造化機闗之外任其自去自來者其胷中平夷無憂喜無怨尤所謂奔趨及相傾之事未嘗萌於意見則亦何爭之有前軰謂死生貧富生來注定君子贏得為君子小人枉了做小人此言甚切人自不知耳人生世間自有知識以來即有憂患不如意事小兒呌號皆其意有不平自㓜至少至壯至老如意之事常少不如意之事常多雖大富貴之人天下之所仰羡以為神仙而其不如意處各自有之與貧賤人無異特所憂慮之事異耳故謂之缺陷世界以人生世間無足心滿意者能達此理而順受之則可少安凡人謀事雖日用至㣲者亦須齟齬而難成或幾成而敗既敗而復成然後其成也永久平寜無復後患若偶然易成後必有不如意者造物㣲機不可測度如此靜思之則見此理可以寛懷人之德性出於天資者各有所偏君子知其有所偏故以其所習為而補之則為全德之人常人不自知其偏以其所偏而直情徑行故多失書言九德所謂寛柔愿亂擾直簡剛强者天資也所謂栗立恭敬毅温亷塞義者習為也此聖賢之所以為聖賢也後世有以性急而佩韋性緩而佩弦者亦近此類雖然己之所謂偏者苦不自覺須詢之他人乃知人之性行雖有所短必有所長與人交游若常見其短而不見其長則時日不可同處若常念其長而不顧其短雖終身與之交游可也處已接物而常懷慢心偽心妬心疑心者皆自取輕辱於人盛德君子所不為也慢心之人自不如人而好輕薄人見敵已以下之人及有求於我者靣前既不加禮背後又竊譏笑若能囘省其身則愧汗浹背矣偽心之人言語委曲若甚相厚而中心乃大不然一時之間人所信慕用之再三則蹤跡露見為人所唾去矣妬心之人常欲我之髙出於人故聞有稱道人之羙者則忿然不平以為不然聞人有不如人者則欣然笑快此何加損於人祗厚怨耳疑心之人人之出言未嘗有心而反復思繹曰此譏我何事此笑我何事則與人締怨常萌于此賢者聞人譏笑若不聞焉此豈不省事言忠信行篤敬乃聖人教人取重於鄉曲之術蓋財物交加不損人而益己患難之際不妨人而利己所謂忠也有所許諾纎毫必償有所期約時刻不易所謂信也處事近厚處心誠實所謂篤也禮貎卑下言辭謙恭所謂敬也若能行此非惟取重於鄉曲則亦無入而不自得然敬之一事於己無損世人頗能行之而矯飾假偽其中心則輕薄是能敬而不能篤者君子指為諛佞鄉人久亦不歸重也忠信篤敬先存其在己者然後望其在人者如在己者未盡而以責人人亦以此責我矣今世之人能自省其忠信篤敬者蓋寡能責人以忠信篤敬者皆然也雖然在我者既盡在人者亦不必深責今有人能盡其在我者固善矣乃欲責人之似已一或不滿我意則疾之已甚亦非有容德者祗益貽怨于人耳今人有為不善之事幸其人之不見不聞安然自肆無所畏忌殊不知人之耳目可掩神之聦明不可掩凡吾之處事心以為可心以為是人雖不知神已知之矣吾之處事心以為不可心以為非人雖不知神已知之矣吾心即神神即禍福心不可欺神亦不可欺詩曰神之格思不可度思矧可射思釋者以謂吾心以為神之至也尚不可得而窺測况不信其神之在左右而以厭射之心處之則亦何所不至哉人為善事而未遂禱之於神求其隂助雖未見效言之亦無愧至於為惡事而未遂亦禱之於神求其隂助豈非欺㒺如謀為盗賊而禱之於神爭訟無理而禱之於神使神果從其言而幸中此乃貽怒于神開其禍端耳凡人行已公平正直可用此以事神而不可恃此以慢神可用此以事人而不可恃此以傲人雖孔子亦以敬鬼神事大夫畏大人為言况下此者哉彼有行已不當理者中有所慊動輙知畏猶能避逺災禍以保其身至於君子而偶罹于災禍者多由自負以召致之耳人之處事能常悔往事之非常悔前言之失常悔往年之未有知識其賢德之進所謂長日加益而人不自知也古人謂行年六十而知五十九之非者可不勉哉凡人為不善事而不成正不須怨天尤人此乃天之所愛終無後患如見他人為不善事常稱意者不須多羡此乃天之所棄待其積惡深厚從而殄滅之不在其身則在其子孫姑少待之當自見也人有所為不善身遭刑戮而其子孫昌盛者人多怪之以為天理有誤殊不知此人之家其積善多積惡少少不勝多故其為惡之人身受其報不妨福祚延及後人若作惡多而享壽富安樂必其前人之遺澤將竭天不愛惜恣其惡深使之大壞也人能忍事易以習熟終至於人以非理相加不可忍者亦處之如常不能忍事亦易以習熟終至於睚眦之怨深不足較者亦至交詈爭訟期以取勝而後已不知其所失甚多人能有定見不為客氣所使則身心豈不大安寜人之平居欲近君子而逺小人者君子之言多長厚端謹此言先入于我心及吾之臨事自然出於長厚端謹矣小人之言多刻薄浮華此言先入于吾心及吾之臨事自然出于刻薄浮華矣且如朝夕聞人尚氣好凌人之言吾亦將尚氣好凌人而不覺矣朝夕聞人游蕩不事繩檢之言吾亦將游蕩不事繩檢而不覺矣如此非一端非大有定力必不免漸染之患也老成之人言有迂闊而更事為多後生雖天資聦明而見識終有不及後生例以老成為迂闊凡其身試見效之言欲以訓後生者後生厭聽而毁詆者多矣及後生年齒漸長歴事漸多方悟老成之言可以佩服然已在險阻艱難備嘗之後矣聖賢猶不能無過况人非聖賢安能每事盡善人有過失非其父兄孰肯誨責非其契愛孰肯諫諭泛然相識不過背後竊譏之耳君子惟恐有過密訪人之有言求謝而思改小人聞人之有言則好為强辨至絶往來或起争訟者有矣言語簡寡在我可以少悔在人可以少怨人之出言舉事能思慮循省而不幸有失則在可諫可議之域至於恣其性情而妄言妄行或明知其非而故為之者是人必挾其兇暴强悍以排人之異己善處鄉曲者如見似此之人非惟不敢諫誨亦不敢寘於言議之間所以逺侮辱也嘗見人不忍平昔所厚之人有失而私納忠言反為人所怒曰我與汝至相厚汝亦謗我耶孟子曰不仁者可與言哉以此不善人雖人所共惡然亦有益于人大抵見不善人則警懼不至自為不善不見不善人則放肆或至自為不善而不覺故家無不善人則孝友之行不彰鄉無不善人則誠厚之跡不著譬如磨石彼自銷損耳刀斧資之以為利老子云不善人乃善人之資謂此爾若見不善人而與之同惡相濟及與之争為長雄則有損而己夫何益鄉曲有不肖子弟耽酒好色博奕游蕩親近小人豢養馳逐輕於破蕩家産至為乞丐竊盗者此其家門厄數如此或其父祖稔惡至此未聞有因諫誨而改者雖其至親亦當處之無可奈何不必譊譊徒厚其怨勉人為善諫人為惡固是羙事先須自省若我之平昔自不能為人豈惟人不見聽亦反為人所薄且如己之立朝可稱乃可誨人以立朝之方己之臨政有效乃可誨人以臨政之術己之才學為人所尊乃可誨人以進修之要己之性行為人所重乃可誨人以操履之詳已能身致富厚乃可誨人以治家之法已能處父母之側而諧和無間乃可誨人以至孝之行苟為不然豈不反為所笑人有出言至善而或有議之者人有舉事至當而或有非之者蓋衆心難一衆口難齊如此君子之出言舉事苟揆之吾心稽之古訓詢之賢者於理無礙則紛紛之言皆不足䘏亦不必辨自古聖賢當代宰輔一時守令皆不能免居鄉曲同為編氓尤其所無畏或輕議己亦何怪焉大抵指是為非必妬忌之人及素有仇怨者此曹何足以定公論正當勿䘏勿辨也人有善誦我之羙使吾喜聞而不覺其諛者小人之最姦黠者也彼其靣諛吾而吾喜及其退與他人語未必不竊笑我為他所愚也人有善揣人意之所向先發其端𨗳而迎之使人喜其言與已暗合者亦小人之最姦黠者也彼其揣我意而果合及其退與他人語又未必不竊笑我為他所料也此雖大賢亦甘受其侮而不悟奈何人有詈人而人不答者人必有所容也不可以為人之畏我而更求以辱之為之不已人或起而我應恐口噤而不能出言矣人有訟人而人不校者人必有所處也不可以為人之畏我而更求以攻之為之不已人或出而我辨恐理虧而不逃罪矣親戚故舊人情厚密之時不可盡以密私之事語之恐一旦失歡則前日所言皆他人所凴以為爭訟之資至有失歡之時不可盡以切實之語加之恐忿氣既平之後或與之通好結親則前言可愧大抵忿怒之際最不可指其隱諱之事而暴其父祖之惡吾之一時怒氣所激必欲指其切實而言之不知彼之怨恨深入骨髓古人謂傷人之言深於矛㦸是也俗亦謂打人莫打膝道人莫道實親戚故舊因言語而失歡者未必其言語之傷人多是顔色辭氣暴厲能激人之怒且如諫人之短語雖切直而能温顔下氣縱不見聽亦未必怒若平常言語無傷人處而詞色俱厲縱不見怒亦須懐疑古人謂怒於室者色於市方其有怒與他人言必不卑遜他人不知所自安得不怪故盛怒之際與人言話尤當自警前軰有言誡酒後語忌食時嗔忍難耐事順自强人常能持此最得便宜高年之人鄉曲所當敬者以其近于親也然鄉曲有年髙而德薄者謂刑罰不加於己輕詈辱人不知愧恥君子所當優容而不較也與人交游無問髙下須常和易不可妄自尊大修飾邊幅若言行崖異則人豈復相近然又不可大䙝狎樽酒㑹聚之際固當歌笑盡歡恐嘲譏中觸人諱忌則忿争興焉行髙人自重不必其貎之髙才髙人自服不必其言之髙居鄉曲間或有貴顯之家以州縣觀望而凌人者又有髙資之家以賄賂公行而凌人者方其得勢之時州縣不能誰何鬼神猶或避之况貧窮之人豈可與之較屋宅墳墓之所隣山林田園之所接必横加殘害使歸於己而後已衣食所資噐用之㣲凡可其意者必奪而有之如此之人惟當遜而避之逮其稔惡之深天誅之加則其家之子孫自能為其父祖破壊以與鄉人復讎也鄉曲更有健訟之人把持短長妄有論訟以致追擾州縣不敢治其罪又有恃其父兄子弟之衆結集兇惡强奪人所有之物不稱意則羣聚毆打又復賄賂州縣多不竟其罪如此之人亦不必求以窮治逮其稔惡之深天誅之加則無故而自罹于憲網有計謀所不及救者大抵作惡而幸免於罪者必於他時無故而受其報所謂天網恢恢疎而不漏也鄉曲士夫有挾術以待人近之不可逺之則難者所謂君子中之小人不可不防慮其信義有失為我之累也農工商賈僕𨽻之流有天資忠厚可任以事可委以財者所謂小人中之君子不可不知宜稍撫之以恩不復慮其詐欺也士大夫居家能思居官之時則不至干請把持而撓時政居官能思居家之時則不至狠愎暴恣而貽人怨不能囘思者皆是也故見任官每每稱寄居官之可惡寄居官亦多談見任官之不韙併與其善者而掩之也忠信二事君子不守者少小人不守者多且如小人以物市於人敝惡之物飾為新竒假偽之物飾為真實如絹帛之用膠糊米麥之増濕潤肉食之灌以水藥材之易以他物巧其言詞止於求售誤人食用有不䘏也其不忠也類如此負人財物久而不償人苟索之期以一月如期索之不售又期以一月如期索之又不售至于十數期而不售如初工匠制噐要其定資責其所制之噐期以一月如期索之不得又期以一月如期索之又不得至于十數期而不得如初其不信也類如此其他不可悉數小人朝夕行之略不知怪為君子者往往忿􅓰直欲深治之至于毆打論訟若君子自省其身不為不忠不信之事而憐小人之無知及其間有不得已而為自便之計至于如此可以少置之度外也張安國舎人知撫州日以有賣假藥者出榜戒約曰陶隱居孫真人因本草千金方濟物利生多積隂德名在列仙自此以來行醫貨藥誠心救人獲福報者甚衆不論方册所載只如近時此驗尤多有只賣一真藥便家貲鉅萬或自身安榮享髙壽或子孫及第改換門户如影隨形無所差錯又曽眼見貨賣假藥者其初積得些少家業自謂得計不知冥冥之中自家合得禄料都被减剋或自身多有横禍或子孫非理破蕩致有遭天火被雷震者盖縁買藥之人多是疾病急切將錢告求賣藥之家孝子順孫只望一服見效却被假藥誤賺非惟無益反致損傷尋常誤殺一飛禽走獸猶有因果况萬物之中人命最重無辜被禍其痛何窮詞多更不盡載舎人此言豈止為假藥者言之有識之人自宜觸類市井街巷茶坊酒肆皆小人雜處之地吾輩或有經由須當嚴重其辭貎則逺輕侮之患或有狂醉之人宜即囘避不必與之較可也衣服舉止異衆不可遊於市必為小人所侮居於鄉曲輿馬衣服不可鮮華蓋鄉曲親故居貧者多在我者孑然異衆貧者羞澁必不敢相近我亦何安之有此說不可與口尚乳臭者言婦女衣飾惟務潔静尤不可異衆且如十數人同處而一人之衣飾獨異衆所指目其行坐能自安否飲食人之所欲而不可無也非理求之則為饕為饞男女人之所欲而不可無也非理狎之則為姦為濫財物人之所欲而不可無也非理得之則為盗為贓人惟縱欲則爭端啟而獄訟興聖王慮其如此故制為禮以節人之飲食男女制為義以限人之取與君子於是三者雖知可欲而不敢輕形於言况敢妄萌于心小人反是聖人云不見可欲使心不亂此最省事之要術蓋人見羙食而下嚥見羙色而必凝視見錢財而必起欲得之心苟非有定力者皆不免此惟能杜其端源見之而不顧則無妄想無妄想則無過舉矣子弟有耽于情慾迷而忘返至于破家而不悔者蓋始于試為之由其中無所見不能識破則遂至于不可囘世人有慮子弟血氣未定而酒色博奕之事得以昏亂其心尋至于失身破家則拘之于家嚴其出入絶其交游致其無所聞見朴野蠢鄙不近人情殊不知此非良策禁防一弛情竇頓開如火燎原不可撲滅况居之于家無所用心却密為不肖之事與出外何異不若時其出入謹其交游雖不肖之事習聞既熟自能識破必知愧而不為縱試為之亦不至于朴野蠢鄙全為小人之所揺蕩也起家之人生財富庻乃日夜憂懼慮不免于飢寒破家之子生事日消乃軒昻自恣謂不復可慮所謂吉人㐫其吉凶人吉其凶此其效騐常見於己壯未老己老未死之前識者當自黙喻起家之人見所作事無不如意以為智術巧妙如此不知其命分偶然志氣洋洋貪取圖得又自以為獨能久逺不可破壊豈不為造物者所竊笑蓋其破壊之人或已生於其家曰子曰孫朝夕環立於其側者他日為父祖破壊生事之人恨其父祖目不及見耳前輩有建第宅宴工匠於東廡曰此造宅之人宴子弟於西廡曰此賣宅之人後果如其言近世士大夫有言目所可見者漫爾經營目所不及見者不須置之謀慮此有識君子知非人力所及其胷中寛泰與蔽迷之人如何起家之人易為増進成立者盖服食噐用及吉凶百費規模淺狹尚循其舊故日入之數多於日出此所以常有餘富家之子易於傾覆破蕩者盖服食噐用及吉凶百費規模廣大尚循其舊又分其財産立數門户則費用増倍於前日子弟有能省用速謀損節猶慮不及况有不一悟者何以支吾古人謂由儉入奢易由奢入儉難蓋謂此爾大貴人之家尤難于保成方其致位通顯雖在閑冷其俸給亦厚其餽遺亦多其使令之人滿前皆州郡廪給其服食噐用雖極華侈而其費不出於家財逮其身後無前日之俸給餽遺使令之人其日用百費非出家財不可况又析一家為數家而用度仍舊豈不至於破蕩此亦勢使之然為子弟各宜量節人之居世有不思父祖起家艱難思與之延其祭祀又不思子孫無所慿藉則無以脫於飢寒多生男女視如路人耽於酒色博奕游蕩破壊家産以取一時之快此皆家門不幸如此冒於刑憲彼亦不䘏豈教誨勸諭責罵之所能囘置之無可奈何而已人有財物慮為人所竊則必緘縢扄鐍封識之甚嚴慮費用之無度而致耗散則必算計較量支用之甚節然有甚嚴而有失者蓋百日之嚴無一日之踈則無失百日嚴而一日不嚴則一日之失與百日不嚴同也有甚節而終至於匱乏者蓋百事節而無一事之費則不至於匱乏百事節而一事不節則一事之費與百事不節同也所謂百事者自飲食衣服屋宅園館輿馬僕御噐用玩好蓋非一端豐儉隨其財力則不謂之費不量財力而為之或雖財力可辦而過於侈靡近於不急皆妄費也年少主家事者宜深知之中産之家凡事不可不早慮有男而為營生教之生業皆早慮也至於養女亦當早為儲蓄衣衾粧奩之具及至遣嫁乃不費力若置而不問但稱臨時此有何術不過臨時鬻田廬及不䘏女子之羞見人也至於家有者人而送終之具不為素辦亦稱臨時亦無他術亦是臨時鬻田廬及不䘏後事之不如儀也今人有生一女而種杉萬根者待女長則鬻杉以為嫁資此其女必不至失時也有於少壯之年置壽衣壽噐壽塋者此其人必不至三日五日無衣無棺可歛三年五年無地可葬也居官當如居家必有頼藉居家當如居官必有綱紀士大夫之子弟苟無世禄可守無常産可依而欲為仰事俯育之資莫如為儒其才質之羙能習進士業者上可以取科第致富貴次可以開門教授以受束脩之奉其不能習進士業者上可以事筆札代牋簡之役次可以習㸃讀為童䝉之師如不能為儒則醫卜星相農圃商賈伎術凡可以養生而不至於辱先者皆可為也子弟之流蕩至於為乞丐盗竊此最辱先之甚然世之不能為儒者乃不肯為醫卜星相農圃商賈伎術等事而甘心為乞丐盗竊者深可誅也凡强顔於貴人之前而求其所謂應副折腰於富人之前而託名於假貸遊食於寺觀而人指為穿雲子皆乞丐之流也居官而掩蔽衆目盗財入己居鄉而欺凌愚弱奪其所有私販官中所禁茶鹽酒酤之屬皆竊盗之流也世人有為之而不自愧者何哉凡人生而無業及有業而喜於安逸不肯盡力者家富則習為下流家貧則必為乞丐凡人生而飲酒無算食肉無度好滛濫習博奕者家富則致於破蕩家貧則必為盗竊人有患難不能濟困苦無所訴貧乏不自存而其人朴訥懐媿不能自言於人者吾雖無餘亦當隨力周助此人縱不能報亦必知恩若其人本非窘乏而以作謁為業挾諛佞之術遍謁貴人富人之門過州干州過縣干縣有所得則以為己能無所得則以為怨讎在今日則無感恩之心在他日則無報德之事正可以不䘏不顧待之豈可割吾之不敢用以資他之不當用居鄉及在旅不可輕受人之恩方吾未達之時受人之恩常在吾懐每見其人常懐敬畏而其人亦以有恩在我常有德色及吾榮達之後遍報則有所不及不報則為虧義故雖一飯一縑亦不可輕受前輩見人仕宧而廣求知己戒之曰受恩多則難以立朝宜詳味此今人受人恩惠多不記省而有所惠於人雖㣲物亦歴歴在心古人言施人勿念受施勿忘誠為難事人有居貧困時不為鄉人所顧及其榮達則視鄉人如仇讎殊不知鄉人不厚於我我以為憾我不厚於鄉人鄉人他日亦獨不記耶但於平時薄我者勿與之厚亦不必致怨若其平時不與吾相識苟我可以濟助之者亦不可不為也聖人言以直報怨最是中道可以通行大抵以怨報怨固不足道而士大夫欲邀長厚之名者或因宿讎縱奸邪而不治皆矯飾不近人情聖人之所謂直者其人賢不以讎而廢之其人不肖不以讎而庇之是非去取各當其實以此報怨必不至逓相酬復無已時也居鄉不得已而後與人爭又大不得已而後與人訟彼稍服其不然則已之不必費用財物交結胥吏求以快意窮治其讎至於爭訟財産本無理而强求得理官吏貪繆或可如志寜不有愧于神明讎者不伏更相訴訟所費財物十數倍于其所直况遇賢明有司安得以無理為有理耶大抵人之所訟互有短長各言其長而掩其短有司不明則牽連不决或决而不盡其情胥吏得以受賕而弄法蔽者之所以破家也官有貪暴吏有横刻賢豪之人不忍鄉曲衆被其惡故出力而訟之然貪暴之官必有所恃或以其有親黨在要路或以其為州郡所深喜故常難動揺横刻之吏亦有所恃或以其為見任官之所喜或以其結州曹吏之有素故常無忌憚及至人户有所訴則官求勢要之書以請託吏以官庫之錢而行賂毁去簿書改易案牘人户雖健訟亦未便輕勝兼論訟官吏之人又只欲刼持官府使之獨畏己初無為衆除害之心常見論訴州縣官吏之人恃為官吏所畏拖延稅賦不納人户有折變已獨不受折變人户有科敷己獨不伏科敷睨立庭下抗對長官端坐司房為辱胥軰冐占官産不肯輸租欺凌善弱强欲斷治請託公事必欲以曲為直或與胥吏通同為姦把持官員使之聽其所為以殘害鄉民凡如此之官吏如此之姦民假以歲月縱免人禍必自為天所誅也士大夫相見往徃多言某縣民淳某縣民頑及詢其所以然乃謂見任官贓汚狼籍鄉民吞聲飲氣而不敢言則為淳鄉人列其惡而訴之州郡監司則為頑此其得頑之名豈不枉哉今人多指奉化縣為頑問之奉化人則曰所訟之官皆有入已贓何謂奉化為頑如黄巖等處人言皆然此正聖人所謂斯民也三代之所以直道而行也何頑之有今具其所以為頑之目應納税賦而不納及應供科配而不供則為頑若官中因事廣科從而隱目其民户不肯供納則不為頑官吏斷事出于至公又合法意乃任私忿求以飜異則為頑官吏受財斷直為曲事有寃抑次第陳訴則不為頑官員清正斷事自己豪横之民無所行賂無所措謀則與胥吏表裏撰合言語粧㸃事務妄興論訴則為頑若官員與吏為徒百般詭計掩人耳目受接賄賂偷盗官錢人户有能出力為衆論訴則不為頑縣道有非理横科及預借官物者必相率而次第陳訟蓋兩稅自有常額足以充上供用州縣用役錢亦有常額足以供解發支雇縣官正已以率下則民間無隱負不輸官中無侵盗妄用未敢以為有餘亦何不足之有惟作縣之人不自檢己喫者着者日用者般挈往來送遺結託置造噐用儲蓄囊篋及其他百色之需取給于守分鄉司為守分鄉司者豈有將己財奉縣官不過就簿書之中恣為欺弊或攬人户税物而不納或將到庫之錢而他用或偽作過軍過客口券旁及修葺廨舎而公求支破或陽為解發而中途截撥其弊百端不可悉舉縣官既素受其汚啖往往知而不問况又有懵然不曉財賦之利病及曉之者又與之通同作弊一年之間雖至小邑虧失數千緡殆不覺也於是有横科預借之患及有拖欠州郡之數及將任滿請託闗節以求脫去而州郡遂將積欠勒令後政補償夫前政以一年財賦不足一年支解為後政者豈能以一年財賦補足數年財賦故於前政預借錢物多不認理或别設巧計隂奪民財以求備足舊欠其禍可勝言哉
