body:
  text: 提要袁氏世範三卷儒家類臣等謹案袁氏世範三卷宋袁采撰考衢州府志采字君載信安人登進士第三宰劇邑以㢘明剛直稱仕至監登聞檢院陳振孫書録解題稱采嘗宰樂清脩縣志十卷王圻續文獻通考又稱其令政和時著有政和襍志縣令小録今皆不傳是編即其在樂清時所作分睦親䖏已治家三門題曰訓俗府判劉鎮為之序始更名世範其書扵立身處世之道反覆詳盡所以砥礪末俗者極為篤摯雖家塾訓䝉之書意求通俗詞句不免于鄙淺然大要明白切要使覽者易知易從固不失為顔氏家訓之亞也明陳繼儒嘗刻之秘笈中字句訛脱特甚今以永樂大典所載宋本互相校勘補遺正悞仍從文獻通考所載勒為三卷云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀袁氏世範原序思所以為善又思所以使人為善者君子之用心也三衢袁公君載徳足而行成學博而文富以論思獻納之姿屈試一邑學道愛人之政武城絃歌不是過矣一日出所為書三卷示鎭曰是可以厚人倫而美習俗吾將版行於兹邑子其為我是正而為之序鎭熟讀詳味者數月一曰睦親二曰處己三曰治家皆數十條目其言則精確而詳盡其意則敦厚而委曲習而行之誠可以為孝悌為忠恕為善良而有士君子之行矣然是書也豈唯可以施之樂清達諸四海可也豈惟可以行之一時垂諸後世可也噫公為一邑而切切焉欲以為己者為人如此則他日致君澤民其思所以兼善天下之心蓋可知矣鎭於公為太學同舍生今又䝉頼於桑梓荷意不鄙乃敢冠以骩骳之文而欲目是書曰世範可乎君載諱采淳熈戊戌中元日承議郎新權通判隆興軍府事劉鎭序同年鄭公景元貽書謂余曰昔溫國公嘗有意於是止以家範名其書不曰世也若欲為一世之範模則有箕子之書在今恐名之者未必人不以為諂而受之者或以為僭宜從其條目此真確論正契余心敢不敬從且刋其言於左使見之者知其不為府判劉公之云亡而私變其説也采謹書
