body:
  text: 袁氏世範卷下宋袁采撰治家人之治家須令垣墻高厚藩籬周密忩壁門關堅牢隨損隨修如有水竇之類亦須常設格子務令新固不可輕忽雖竊盜之巧者穴牆剪籬穿壁决關俄頃可辦比之頽牆敗籬腐壁敝門以啓盜者有間矣且免奴僕奔竄及不肖子弟夜出之患如外有竊盜內有奔竄及子弟生事縱官司為之受理豈不重費財力居止或在山谷村野僻靜之地須於周圍要害去處置立莊屋招誘丁多之人居之或有火燭竊盜可以即相救應凡夜犬吠盜未必至亦是盜來探試不可以為他而不警夜間遇物有聲亦不可以為鼠而不警屋之周圍須令有路可以往來夜間遣人十數遍巡之善慮事者居於城郭無甚隙地亦為夾牆使邏者往來其間若屋之內則子弟及奴婢更迭巡警夜間覺有盜便須直言有盜徐起逐之盜必且竄不可乘暗擊之恐盜之急以刀傷我或誤擊自家之人若持燭見盜擊之猶庶幾若獲盜而已受拘執自當凖法無過毆傷多蓄之家盜所覬覦而其人又多置什物喜于矜耀尤盜之所垂涎也富厚之家若多儲錢穀少置什物少蓄金寶絲帛縱被盜亦不多失前輩有戒其家自冬夏衣之外藏帛以備不虞不過百匹此亦髙人之見豈可與世俗言劫盜有中夜炬火露刃排門而入人家者此尤不可不防須于諸處往來路口委人為耳目或有異常則可以先知仍預置便門遇有警急老幼婦女且從便門走避又須子弟及僕者平時常備器械為禦寇之計可敵則敵不可敵則避切不可令盜得我之人執以為質則鄰保及捕盜之人不敢前劫盜雖小人之雄亦自有識見如富家平時不刻剝又能樂施又能種種方便當兵火擾攘之際猶得保全至不忍焚毁其屋凡盜所快意於焚掠汙辱者多是積惡之人富家各宜自省家居或有失物不可不急尋急尋則人或投之僻處可以復收則無事矣不急則轉而外出愈不可見又不可妄猜疑人猜疑之當則人或自疑恐生他虞猜疑不當則正竊者反自得意况疑心一生則所疑之人揣其行坐辭色皆若竊物而實未嘗有所竊也或己形于言或妄有所執治而所失之物偶見或正竊者方獲則悔將何及居宅不可無鄰家慮有火燭無人救應宅之四圍雖無溪流當為池井慮有火燭無水救應又須平時撫恤鄰里有恩義有士大夫平時多以官勢殘虐鄰里一日為讐人刃其家火其屋宅鄰里更相戒曰若救火火熄之後非惟無功彼更訟我以為盜取他家財物則獄訟未知了期若不救火不過杖一百而已鄰居甘受杖而坐視其大厦為灰燼生生之具無遺此其平時暴虐之效也火之所起多從厨竈蓋厨屋多時不掃則埃墨易得引火或竈中有留火而竈前有積薪接連亦引火之端也夜間最當巡視烘焙物色過夜多致遺火人家房户多有覆蓋宿火而以衣籠罩其上皆能致火須常戒約蠶家屋宇低隘於炙簇之際不可不防火農家儲積糞壤多為茅屋或投死灰於其間須防內有餘燼未滅能致火燭茅屋須常防火大風須常防火積油物積石灰須常防火此類甚多切須詢究富人有愛其小兒者以金銀珠寶之屬飾其身小人有貪者於僻靜處壞其性命而取其物雖聞於官而置於法何益市邑小兒非有壯夫携負不可令游街巷慮有誘略之人也人之家居井必有幹池必有欄深溪急流之處峭險髙危之地機關觸動之物必有禁防不可令小兒狎而臨之脫有疏虞歸怨於人何及親賔相訪不可多虐以酒或被酒夜卧須令人照管往時括蒼有困客以酒且慮其不告而去于是卧於空舍而鑰其門酒渴索漿不得則取花瓶水飲之次日啓關而客死矣其家訟於官郡守汪懷忠究其一時舍中所有之物云有花瓶浸旱蓮花試以旱蓮花浸瓶中取罪當死者試之驗乃釋之又置水于案而不掩覆屋有伏蛇遺毒於水客飲而死者凡事不可不謹如此清晨早起昏晚早睡可以杜絶婢僕姦盜等事司馬溫公居家雜儀令僕子非有緊急修葺不得入門中婦女婢妾無故不得出中門只令鈴下小童通傳內外治家之法此過半矣婢妾與主翁親近或多挾此私通僕輩有子則以主翁藉口畜愚賤之裔至破家者多矣凡有婢妾不可不謹其始亦不可不防其終人有婢妾不禁出入至與外人私通有妊不正其罪而遽逐去者往往有於主人身故之後自言是主翁遺腹子以求歸宗旋致興訟世俗所冝警此免纍後人人有以正室妬忌而於别宅置婢妾者有供給娼女而絶其與人往來者其關防非不密監守非不謹然所委監守之人得其犒遺反與外人為耳目以通往來而主翁不知至養其所生子為嗣者又有婦人臨蓐主翁不在則棄其所生之女而取他人之子為己子者主翁從而收養不知非其己子庸俗愚暗大抵類此婦女多妬有正室者少蓄婢妾蓄婢妾者多無正室夫蓄婢妾者內有子弟外有僕𨽻皆當關防制以主母猶有他事况無所統轄以一人之耳目臨之豈難欺蔽㦲暮年尤非所宜使有意外之事當如之何夫蓄婢妾之家有僻室而人所不到有便門而可以通外或溷厠與厨竈相近而使膳夫掌庖或夜飲在於內堂而使僕子供役其弊有不可防者蓋此曹深謀而主不之猜此曹迭為耳目而主又何由知覺夫置婢妾教之歌舞或使侑樽以為賔客之歡切不可蓄姿貌黠慧過人者慮有惡客起覬覦之心彼見美麗心欲得之逐獸則不見泰山苟勢可以臨我則無不至緑珠之事在古所鑒近世亦多有之不欲指言其名士大夫之家有夜間男女羣聚呼盧至於達旦豈無託故而起者試靜思之人家有僕當取其朴直謹願勤於任事不必責其應對進退之快人意人之子弟不知溫飽所自來者不求自己德業之出衆而獨欲僕者俏黠之出衆費財以養無用之人固未甚害生事為非皆此輩導之也僕者而有市井浮浪子弟之態異巾美服言語矯詐不可蓄也蓄僕之久而驟然如此閨閫之事必有可疑奴僕小人就役於人者天資多愚作事乖舛背違不曽有便當省力之處如頓放什物必以斜為正如裁截物色必以長為短若此之類殆非一端又性多忘囑之以事全不記憶又性多執所見不是自以為是又性多狠輕于應對不識分守所以雇主於使令之際常多叱咄其為不改其言愈辨雇主愈不能平於是箠楚加之或失手而至于死亡者有矣凡為家長者於使令之際有不如意當云小人天資之愚如此宜寬以處之多其教誨省其嗔怒可也如此則僕者可以免罪主者胸中亦大安樂省事多矣至於婢妾其愚尤甚婦人既多褊急狠愎暴忍殘刻又不知古今道理其所以責備婢妾者又非丈夫之比為家長者冝于平昔常以待奴僕之理喻之其間必自有曉然者人之居家凡有作為及安頓什物以至田園倉庫厨厠等事皆自為之區處然後三令五申以責付奴僕猶懼其遺忘不如吾志今有人一切不為之區處凡事無大小聼奴僕自為謀不合己意則怒罵鞭撻繼之彼愚人止能出力以奉吾令而已豈能善謀一一暗合吾意若不知此自見多事且如工匠執役必使一不執役者為之區處謂之都料匠蓋人凡有執為則不暇他見須令一不執為者旁觀而為之區處則不煩擾而功增倍矣婢僕有頑狠全不中使令者宜善遣之不可留留則生事主或過于毆傷此輩或挾怨為惡有不容言者婢僕有姦盜及逃亡者宜送之于官依法治之不可私自鞭撻亦恐有意外之事或逃亡非其本情或所竊止於飲食微物宜念其平日有勞只略懲之仍前留備使令可也婢僕有小過不可親自鞭撻蓋一時怒氣所激鞭撻之數必不記徒且費力婢僕未必知畏惟徐徐責問令他人執而撻之視其過之輕重而定其數雖不過怒自然有威婢妾亦自然畏憚矣壽昌胡倅彥特之家子弟不得自打僕𨽻婦女不得自打婢妾有過則告之家長家長為之行遣婦女擅打婢妾則撻子弟此賢者之家法也婢僕有過既已鞭撻而呼喚使令辭色如常則無他事蓋小人受杖方內懷怨而主人怒不知釋恐有輕生而自殘者婢僕有無故而自經者若其身溫可救不可解其縛須急抱其身令稍髙則所縊處必稍寬仍更令一人以指於其縊處漸漸寬之覺其氣漸往來乃可解下仍急令人吸其鼻中使氣相接乃可以蘇或不曉此理而先解其繫處其身力重其縊處愈急只一噓氣便不可救此不可不預知也如身已冷不可救或救而不蘇當留本處不可移動呌集鄰保以事聞官仍令得力之人日夜同與守視恐有犬鼠之屬殘其尸也自刃不殊宜以物掩其傷處或已絶亦當如前說人家有井於甃處宜為缺級令可以上下或有墜井投井者可以令人救應或不及亦當如前說溺水投水而水深不可援者宜以竹篙及木板能浮之物投與之溺者有所執則身浮可以救應或不及亦當如前說夜睡魔死及卒死者亦不可移動並當如前說婢僕無親屬而病者當令出外就鄰家醫治仍經鄰保録其詞說却以聞官或有死亡則無他慮婢僕欲其出力辦事其所以禦飢寒之具為家長者不可不留意衣須令其溫食須令其飽士大夫有云蓄婢不厭多教之紡績則足以衣其身蓄僕不厭多教之耕種則足以飽其腹大抵小民有力足以辦衣食而力無所施則不能以自活故求就役于人為富家者能推惻隱之心蓄養婢僕乃以其力還養其身其德至大矣而此輩既得溫飽雖苦役之亦甘心焉婢僕宿卧去處皆為檢㸃令冬時無風寒之患以至牛馬猪羊猫狗雞鴨之屬遇冬寒時各為區處牢圈棲息之處此皆仁人之用心備物我為一理也飛禽走獸之與人形性雖殊而喜聚惡散貪生畏死其情則與人同故離羣則向人悲鳴臨庖則向人哀號為人者既忍而不之顧反怒其鳴號者有矣胡不反已以思之物之有望於人猶人之有望於天也物之鳴號有訴於人而人不之恤則人之處患難死亡困苦之際乃欲仰首呌號求天之恤耶大抵人居病患不能支持之時及處囹圄不能脫去之時未嘗不反覆究省平日所為某者為惡某者為不是其所以改悔自新者指天誓日可表至病患平寧及脫去罪戾則不復記省造罪作惡無異往日余前所言若言於經歷患難之人必以為然猶恐痛定之後不復記省彼不知患難者安知不以吾言為迂有子而不自乳使他人乳之前輩已言其非矣况其間求乳母於未産之前者使不舉己子而乳我子有子方嬰孩使捨之而乳我子其己子呱呱而泣至于餓死者有因仕宧他處逼勒牙家誘賺良人之妻使捨其夫與子而乳我子因挾以歸家使其一家離散生前不復相見者士夫遞相庇護國家法令有不䏻禁彼獨不畏於天㦲以人之妻為婢年滿而送還其夫以人之女為婢年滿而送還其父母以他鄉之人為婢年滿而送還其鄉此風俗最近厚者浙東士大夫多行之有不還其夫而擅嫁他人有不還其父母而擅與嫁人皆興訟之端况有不恤其離親戚去鄉土役之終身無夫無子死為無依之鬼豈不甚可憐哉蓄奴婢惟本土人最善蓋或有病患則可責其親屬為之扶持或有非理自殘既有親屬眀其事因公私又有質證或有婢妾無父子兄弟可依僕𨽻無家可歸念其有勞不可不養者當令預經鄰保自言併陳於官或預為之擇其配婢使之嫁僕使之娶皆可絶他日意外之患也雇婢僕須要牙保分眀牙保又不可令我家人為之也買婢妾既已成契不可不細詢其所自來恐有良人子女為人所誘略果然則即告之官不可以婢妾還與引來之人慮殘其性命也買婢妾須問其應典賣不應典賣如不應典賣則不可成契或果窮乏無所依倚須令經官自陳下保審㑹方可成契或其不能自陳令引來之人契中稱說少與雇錢待其有親人識認即以與之也族人鄰里親戚有狡獪子弟䏻恃强凌人損彼益此富家多用之以為爪牙且得目前快意此曹內既姦巧外常柔順子弟責罵狎玩常能容忍為子弟者亦愛之他日家長既沒之後誘子弟為非者皆此等人也大抵為家長者必自老練又其智略能駕馭此曹故得其力至于子弟須賢眀如其父兄則可無慮中材之人鮮不為其鼓惑以致敗家唐史有言妖禽孽狐當晝則伏息自如得夜乃為之祥正謂此曹若平昔延接淳厚剛正之人雖言語多拂人意而子弟與之久處則有身後之益所謂快意之事常有損拂意之事常有益凡事皆然宜廣思之幹人有管庫者須常謹其簿書審其見存幹人有管穀米者須嚴其簿書謹其管籥兼擇謹畏之人使之看守幹人有貸財本興販者須擇其淳厚愛惜家纍方可付託蓋中産之家日費之計猶難支吾况受傭于人其飢寒之計豈能周足中人之性目見可欲其心必亂况下愚之人見酒食聲色之美安得不動其心向來財不滿其意而充其欲故內則與骨月同飢寒外則視所見如不見今其財物盈溢於目前若日日嚴謹此心姑寢主者事勢稍寬則亦何憚而不為其始也移用甚微其心以為可償猶未經慮久而主不之覺則日增焉月益焉積而至于一歲移用已多其心雖惴惴無可奈何則求以掩覆至二年三年侵欺已大彰露不可掩覆主人欲峻治之已近噬臍故凡委託幹人所冝警此國家以農為重蓋以衣食之源在此然人家耕種出於佃人之力可不以佃人為重遇其有生育婚嫁營造死亡當厚賙之耕耘之際有所假貸少收其息水旱之年察其所虧早為除减不可有非理之需不可有非時之役不可令子弟及幹人私有所擾不可因其讐者告語增其嵗入之租不可强其稱貸使厚供息不可見其自有田園輒起貪圖之意視之愛之不啻如骨肉則我衣食之源悉藉其力俯仰可以無愧怍矣佃僕婦女等有於人家婦女小兒處稱莫令家長知而欲重息以生借錢穀及欲借質物以濟急者皆是有心脫漏必無還意而婦女小兒不令家長知則不敢取索終為所負為家長者冝常以此喻其家尼姑道婆媒婆牙婆及婦人以買賣針灸為名者皆不可令入人家凡脫漏婦女財物及引誘婦女為不美之事皆此曹也池塘陂湖河埭蓄水以溉田者須於每年冬月水涸之際浚之使深築之使固遇天時亢旱雖不至于大稔亦不至於全損今人往往於亢旱之際常思修治至收刈之後則忘之矣諺所謂三月思種桑六月思築塘蓋傷人之無逺慮如此池塘陂湖河埭有衆享其溉田之利者田多之家當相與率倡令田主出食佃人出力遇冬時修築令多蓄水及用水之際逺近髙下分水必均非止利己又且利人其利豈不溥哉今人當修築之際靳出食力及用水之際奮臂交爭有以鋤耰相毆至死者縱不死亦至坐獄被刑豈不可傷然至此者皆田主慳吝之罪也桑果竹木之屬春時種植甚非難事十年二十年之間即享其利今人往往于荒山間地任其棄廢至于兄弟析産或因一根荄之微忿爭失歡比鄰山地偶有竹木在兩界之間則興訟連年寧不思使向來天不産此則將何所爭若以爭訟所費庸工植木則一二十年間所謂材木不可勝用也其間有果木逼于鄰家實利有及于童稚則怒而伐去之者尤無所見也人有小兒須常戒約莫令與鄰里損折果木之屬人養牛羊須常看守莫令與鄰里踏踐山地六種之屬人養雞鴨須常照管莫令與鄰里損啄菜茹六種之屬有産業之家又須各自勤謹墳墓山林欲藂緑長茂䕃映須髙其墻圍令人不得踰越園圃種植菜茹六種及有時果去處嚴其籬圍不通人往來則亦不致臨時責怪他人也人有田園山地界至不可不分眀異居分析之初置産制買之際尤不可不仔細人之爭訟多由此始且如田畝有因地勢不平分一邱為兩邱者有欲便順併兩邱為一邱者有以屋基山地為田又有以田為屋基園地者有改移街路水圳者官中雖有經界圖籍壞爛不存者多矣况又從而改易不經官司鄰保驗證豈不大啓爭端人之田畝有在上邱者若常修田畔莫令傾倒人之屋基園地若及時築疊垣墻才損即修人之山林若分眀挑掘溝塹才損即修有何爭訟惟其鹵莽傾倒修治失時屋基園地止用籬園年深壞爛因而侵占山林或用分水猶可辨眀間有以木以石以坎為界年深不存及以坑為界而外又有一坑相似者未嘗不啓紛紛不决之訟也至於分析止憑􅍐書典買止慿契書或有鹵莽記載不明公私皆不能决可不戒哉間有典買山地幸其界至有疑故令元契稱說不明因而包占者此小人之用心遇明有司自正其罪矣分析之家置造􅍐書有各人止録已分所得田産者有一本互見他分者止録已分多是內有私曲不欲顯暴故常多爭訟若互見他分厚薄肥瘠可以畢見在官在私易為折斷此外或有宣勞於衆衆分棄與田産或有一分獨薄衆分棄與田産或有因妻財因仕宧置到來歷明白或有因營運置到而衆不願分者並宜於􅍐書後開具仍須斷約不在開具之數則為漏􅍐雖分析後許應分人别求均分可以杜絶隱瞞之弊不至連年爭訟不决人有求避役者雖私分財産甚均而􅍐書砧基則粧在一分之內令一人認役其他物力低小不須充應而其子孫有欲執書契而掩有之者遂興訴訟官司欲斷從實則於文有礙欲以文為斷而情則不然此皆俗曹初無逺見規避於目前而貽爭於身後可不鑒此人有已分財産而欲避免差役則冒同宗有官之人為一戶籍者皆他日爭訟之端由也縣道貪汚遇有析户印􅍐則厚有所需人户憚於所費皆匿而不印私自割析經年既深貧富不同恩義頓疏或至爭訟一以為已分失去􅍐書一以為分財未盡未立􅍐書官中從文則礙情從情則礙文故多久而不决之患凡析户之家宜即􅍐書以杜後患人户交易當先憑牙家索取􅍐書砧基指出邱假圍號就問現佃人有無界至交加典賣重疊次問其所親有無應分人出外未回及在卑幼未經分析或係棄産必問其初應與不應受棄或寡婦卑子執憑交易必問其初曽與不曽與勘㑹如係轉典賣則必問其元契己未投印有無諸般違礙方可立契如有寡婦幼子應押契人必令人親見其押字如價貫年月四至畝角必即書填應債負貨物不可用必支見錢取錢必有處所擔錢人必有姓名已成契後必即投印慮有交易在後而投印在前者已印契後必即離業慮有交易在後而管業在前者已離業後必即割稅慮因循不割稅而為人告論以致拘沒者官中條令惟交易一事最為詳備蓋欲以杜爭端也而人户不悉乃至違法交易及不印契不離業不割稅以致重疊交易詞訟連年不决者豈非人戶自速其辜哉凡鄰近利害欲得之産冝稍增其價不可恃其有親有鄰及以典至賣及無人敢買而扼損其價萬一他人買之則悔且無及而爭訟由之以興也凡田産有交關違條者雖其價亷不可與之交易他時事發到官則所費或十倍然富人多要買此産自謂將來拚錢與人打官司此其癖不可救然自遺患與患及子孫者甚多凡交易必須項項合條即無後患不可憑恃人情契密不為之防或有失歡則皆成爭端如交易取錢未盡及贖産不曽取契之類宜即理㑹去著或即聞官以絶將來詞訴切戒切戒貧富無定勢田宅無定主有錢則買無錢則賣買産之家當知此理不可苦害賣産之人蓋人之賣産或以缺食或以負債或以疾病死亡婚嫁爭訟已有百千之費則鬻百千之産若買産之家即還其直雖轉手無留且可以了其出産欲用之一事而為富不仁之人知其欲用之急則陽距而隂鈎之以重扼其價既成契則姑還其直之什一二約以數日而盡償至數日而問焉則辭以未辦又屢問之或以數緡授之或以米穀及他物髙估而補償之出産之家必大窘乏所得零微隨即耗散向之所擬以辦某事者不復辦矣而往還取索夫力之費又居其中彼富者方自竊喜以為善謀不知天道好還有及其身而獲報者有不在其身而在其子孫者冨家多不之悟豈不迷哉假貸錢穀責令還息正是貧富相資不可闕者漢時有錢一千貫者比千户侯謂其一嵗可得息錢二百千比之今時未及二分今若以中制論之質庫月息自二分至四分貸錢月息自三分至五分貸穀以一熟論自三分至五分取之亦不為虐還者亦可無詞而典質之家至有月息什而取一者江西有借錢約一年償還而作合子立約者謂借一貫文約還兩貫文衢之開化借一稱禾而取兩稱浙西上户借一石米而收一石八斗皆不仁之甚然父祖以是而取于人子孫亦復以是而償於人所謂天道好還於此可見兼并之家見有産之家子弟昏愚不肖及有緩急多是將錢强以借與或始借之時設酒食以媚恱其意或既借之後歷數年不索取待其息多又設酒食招誘使之結轉併息為本别更生息又誘勒其將田産折還法禁雖嚴多是幸免惟天網不漏諺云富兒更替做蓋謂迭相酬報也有輕於舉債者不可借與必是無藉之人已懷負賴之意凡借人錢穀少則易償多則易負故借穀至百石借錢至百貫雖力可還亦不肯還寧以所還之資為爭訟之費者多矣凡人之敢於舉債者必謂他日之寬餘可以償也不知今日之無寬餘他日何為而有寬餘譬如百里之路分為兩日行則兩日可辦若欲以今日之路使明日併行雖勞苦而不可至凡無逺識之人求目前寬餘而那積在後者無不破家也切宜監此凡有家産必有稅賦須是先截留輸納之資臨時為官中所迫則舉債認息或託攬户兊納而高價算還是皆可以耗家大抵曰貧曰儉自是賢德又是美稱切不可以此為愧若能如此則無破家之患矣納稅雖有省限須先納為安如納苗米若不趂晴早納必欲拖後或值雨雪連日將如之何然州郡多有不體量民事如納秋米初時既要乾圎加量又重後來縱納濕惡加量又輕又後來則折為低價如納稅絹初時必欲至厚實者後來見納數之少則放行輕疏又後來則折為低價人户及攬子多是較量前後輕重不肯搶先送納致被縣道追擾惟鄉曲賢者自求省事不以毫末之較遂愆期也鄉人有紏率錢物以造橋修路及打造渡航者宜隨力助之不可謂捨財不見獲福而不為且如道路既成吾之晨出暮歸僕馬無疏虞及乘輿馬過橋渡而不至惴栗者皆所獲之福也人之經營財利偶獲厚息以致富盛者必其命運亨通造物者隂賜致此其間有見他人獲息之多致富之速則欲以人事强奪天理如販米而加以水賣鹽而雜以灰賣漆而和以油賣藥而易以他物如此等類不勝其多目下多得贏餘其心便自欣然而不知造物者隨即以他事取去終於貧乏况又因假壞真以虧本者多矣所謂人不勝天大抵轉販經營須是先存心地凡物貨必真必須敬惜如欲以此奉神明又須不敢貪求厚利任天理如何雖目下所得之薄必無後患至於買撲坊場之人尤當如此造酒必極醇厚精潔則私酤之家自然難售其間或有私醖必審止絶之術不欲挾此打破人家朝夕存念止欲趂辦官課飬育孥纍不可妄求厚積及計㑹司案拖賴官錢若命運亨通則自能富厚不然亦不致破蕩請以應開坊之人觀之起造屋宇最人家至難事年齒長壯世事諳歷於起造一事猶多不悉况未更事其不因此破家者幾希蓋起造之時必先與匠者謀匠者惟恐主人憚費而不為則必小其規模節其費用主人以為力可以辦鋭意為之匠者則漸增廣其規模至數倍其費而屋猶未及半主人勢不可輟則舉債鬻産匠者方喜興作之未艾工鏹之益增余嘗勸人起造屋宇須十數年經營以漸為之則屋成而家富自若蓋先議基址或平高就下或增卑為髙或築墻穿池逐年漸為之期以十數年而後成次議規模之髙廣材木之若干細至椽桷籬壁竹木之屬必籍其數逐年買取隨即斫削期以十數年而畢備次議瓦石之多少皆預以餘力積漸而儲之雖僦雇之費亦不取辦於倉卒故屋成而家富自若也後序近世老師宿儒多以其言集為語録𫝊示學者蓋欲以所自得者與天下共之也然皆議論精微學者所造未至雖勤誦深思猶不開悟况中人以下乎至於小說詩話之流特賢於己非有裨於名教亦有作為家訓戒示子孫或不該詳𫝊焉未廣采朴鄙好論世俗事而性多忘人有能誦其前言而已或不記憶續以所言私筆之久而成編假而録之者頗多不能遍應乃鋟木以𫝊昔子思論中庸之道其始也夫婦之愚皆可與知夫婦之不肖皆可能行極其至妙則雖聖人亦不能知不能行而察乎天地今若以察乎天地者而語諸人前輩之語録固已連篇纍牘姑以夫婦之所與知能行者語諸世俗使田夫野老幽閨婦女皆曉然於心目間人或好惡不同互是迭非必有一二契其心者庶幾息爭省刑俗還醇厚聖人復起不吾廢也初余目是書為俗訓府判同舍劉公更曰世範似過其實三請易之不聼終當從其舊云淳熙己亥上元三衢梧坡袁采書於樂清琴堂
