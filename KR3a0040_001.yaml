body:
  text: 袁氏世範卷上宋袁采撰睦親人之至親莫過於父子兄弟而父子兄弟有不和者父子或因於責善兄弟或因於爭財有不因責善爭財而不和者世人見其不和或就其中分别是非而莫明其由蓋人之性或寬緩或褊急或剛暴或柔懦或嚴重或輕薄或持檢或放縱或喜間靜或喜紛拏或所見者小或所見者大所稟自是不同父必欲子之性合於己子之性未必然兄必欲弟之性合於己弟之性未必然其性不可得而合則其言行亦不可得而合此父子兄弟不和之根源也况凡臨事之際一以為是一以為非一以為當先一以為當後一以為宜急一以為宜緩其不齊如此若互欲同於己必致爭論爭論不勝至於再三至於十數則不和之情自兹而啓或至於終身失歡若悉悟此理為父兄者通情於子弟而不責子弟之同於己為子弟者仰承於父兄而不望父兄惟己之聽則處事之際必相和協無乖爭之患孔子曰事父母幾諫見志不從又敬不違勞而不怨此聖人教人和家之要術也宜熟思之人之父子或不思各盡其道而互相責備者尤啓不和之漸也若各能反思則無事矣為父者曰吾今日為人之父蓋前日嘗為人之子矣凡吾前日事親之道每事盡善則為子者得於見聞不待教詔而知效倘吾前日事親之道有所未善將以責其子得不有愧於心為子者曰吾今日為人之子則他日亦當為人之父今父之撫育我者如此畀付我者如此亦云厚矣他日吾之待其子不異於吾之父則可以俯仰無愧若或不及非惟有負於其子亦何顔以見其父然世之善為人子者常善為人父不能孝其親者常欲虐其子此無他賢者能自反則無往而不善不賢者不能自反為人子則多怨為人父則多暴然則自反之説惟賢者可以語此慈父固多敗子子孝而父或不察蓋中人之性遇強則避遇弱則肆父嚴而子知所畏則不敢為非父寬則子玩易而恣其所行矣子之不肖父多優容子之願慤父或責備之無己惟賢智之人即無此患至於兄友而弟或不恭弟恭而兄不友夫正而婦或不順婦順而夫或不正亦由此強即彼弱此弱即彼強積漸而致之為人父者能以他人之不肖子喻己子為人子者能以他人之不賢父喻己父則父慈而子愈孝子孝而父亦慈無偏勝之患矣至如兄弟夫婦亦各能以他人之不及者喻之則何患不友恭正順者哉自古人倫賢否相雜或父子不能皆賢或兄弟不能皆令或夫流蕩或妻悍暴少有一家之中無此患者雖聖賢亦無如之何譬如身有瘡痍疣贅雖甚可惡不可決去惟當寬懷處之能知此理則胸中泰然矣古人所以謂父子兄弟夫婦之間人所難言者如此子之於父弟之於兄猶卒伍之於將帥胥吏之於官曹奴婢之於雇主不可相視如朋輩事事欲論曲直若父兄言行之失顯然不可掩子弟止可和顔幾諫若以曲理而加之子弟尤當順受而不當辨為父兄者又當自省人言居家久和者夲於能忍然知忍而不知處忍之道其失尤多蓋忍或有藏蓄之意人之犯我藏蓄而不發不過一再而已積之既多其發也如洪流之決不可遏矣不若隨而解之不置胸次曰此其不思爾曰此其無知爾曰此其失誤爾曰此其所見者小爾曰此其利害寧幾何不使之入於吾心雖日犯我者十數亦不至形於言而見於色然後見忍之功效為甚大此所謂善處忍者骨肉之失歡有夲於至微而終至不可解者止由失歡之後各自負氣不肯先下爾朝夕羣居不能無相失相失之後有一人能先下氣與之話言則彼此酬復遂如平時矣宜深思之興盛之家長幼多和協蓋所求皆遂無所爭也破蕩之家妻孥未嘗有過而家長每多責罵者衣食不給觸事不諧積忿無所發惟可施於妻孥之前而已妻孥能知此則尤當奉承高年之人作事有如嬰孺喜得錢財微利喜受飲食果實小惠喜與孩童玩狎為子弟者能知此而順適其意則盡其歡矣人之孝行根於誠篤雖繁文末節不至亦可以動天地感鬼神嘗見世人有事親不務誠篤乃以聲音笑貌繆為恭敬者其不為天地鬼神所誅則幸矣况望其世世篤孝而門戶昌隆者乎苟能知此則自此而往凡與物接皆不可不誠有識君子試以誠與不誠較其久逺效驗孰多人當嬰孺之時愛戀父母至切父母于其子嬰孺之時愛念尤厚撫育無所不至蓋由氣血初分相去未逺而嬰孺之聲音笑貌自能取愛於人亦造物者設為自然之理使之生生不窮雖飛走微物亦然方其子初脫胎卵之際乳飲哺啄必極其愛有傷其子則護之不顧其身然人於既長之後分稍嚴而情稍疏父母方求盡其慈子方求盡其孝飛走之屬稍長則母子不相識認此人之所以異於飛走也然父母於其子幼之時愛念撫育有不可以言盡者子雖終身承顔致養極盡孝道終不能報其少小愛念撫育之恩况孝道有不盡者凡人之不能盡孝道者請觀人之撫育嬰孺其情愛如何當終自悟亦由天地生育之道所以及人者至廣至大而人之回報天地者何在有對虛空焚香跪拜或召羽流齋醮上帝則以為能報天地果足以報其萬分之一乎况又有怨咨于天地者皆不能反思之罪也人之有子多於嬰孺之時愛忘其醜恣其所求恣其所為無故呌號不知禁止而以罪保母凌轢同輩不知戒約而以咎他人或言其不然則曰小未可責日漸月漬養成其惡此父母曲愛之過也及其年齒漸長愛心漸疏微有疵失遂成憎怒撫其小疵以為大惡如遇親故粧飾巧辭歷歷陳數斷然以大不孝之名加之而其子實無他罪此父母妄憎之過也愛憎之私多先於母氏其父若不知此理則徇其母氏之説牢不可解為父者須詳察之子幼必待以嚴子壯無薄其愛人之有子須使有業貧賤而有業則不至於飢寒富貴而有業則不至於為非凡富貴之子弟耽酒色好博奕異衣服飾輿馬與群小為伍以至破家者非其夲心之不肖由無業以度日遂起為非之心小人贊其為非則有餔啜錢財之利常乘間而翼成之子弟痛宜省悟大抵富貴之家教子弟讀書固欲其取科第及深究聖賢言行之精微然命有窮達性有昏明不可責其必到尤不可因其不到而使之廢學蓋子弟知書自有所謂無用之用者存焉史傳載故事文集妙詞章與夫隂陽卜筮方技小説亦有可喜之談篇卷浩博非嵗月可竟子弟朝夕於其間自有資益不暇他務又必有朋舊業儒者相與往還談論何至飽食終日無所用心而與小人為非也人有數子飲食衣服之愛不可不均一長幼尊卑之分不可不嚴謹賢否是非之迹不可不分别幼而示之以均一則長無爭財之患幼而教之以嚴謹則長無悖慢之患幼而有所分别則長無為惡之患今人之於子喜者其愛厚而惡者其愛薄初不均平何以保其他日無爭少或犯長而長或凌少初不訓責何以保其他日不悖賢者或見惡而不肖者或見愛初不允當何以保其他日不為惡人之兄弟不和而至於破家者或由於父母憎愛之偏衣服飲食言語動靜必厚於所愛而薄於所憎見愛者意氣日橫見憎者心不能平積久之後遂成深讎所謂愛之適所以害之也苟父母均其所愛兄弟自相和睦可以兩全豈不甚善父母見諸子中有獨貧者往往念之常加憐恤飲食衣服之分或有所偏私子之富者或有所獻則轉以與之此乃父母均一之心而子之富者或以為怨此殆未之思也若使我貧父母必移此心於我矣人於子孫雖見其作事多拂己意亦不可深憎之大抵所愛之子孫未必孝或早夭而暮年依託及身後葬祭多是所憎之子孫其他骨肉皆然請以他人已驗之事觀之同母之子而長者或為父母所憎幼者或為父母所愛此理殆不可曉竊嘗細思其由蓋人生一二歲舉動笑語自得人憐雖他人猶愛之况父母乎才三四歲至五六歲恣性啼號多端乖劣或損動器用冒犯危險凡舉動言語皆人之所惡又多癡頑不受訓戒故雖父母亦深惡之方其長者可惡之時正值幼者可愛之日父母移其愛長者之心而更愛幼者其憎愛之心從此而分遂成迤邐最幼者當可惡之時下無可愛之者父母愛無所移遂終愛之其勢或如此為人子者當知父母愛之所在長者宜少讓幼者宜自抑為父母者又須覺悟稍稍回轉不可任意而行使長者懷怨而幼者縱欲以致破家父母於長子多不之愛而祖父母於長孫常極其愛此理亦不可曉豈亦由愛少子而遷及之耶凡人之子性行不相逺而有後母者獨不為父所喜父無正室而有寵婢者亦然此固父之昵於私愛然為子者要當一意承順則天理久而自協凡人之婦性行不相逺而有小姑者獨不為舅姑所喜此固舅姑之愛偏然為兒婦者要當一意承順則尊長久而自悟或父或舅姑終於不察則為子為婦無可奈何加敬之外任之而已兄弟子姪同居至於不和夲非大有所爭由其中有一人設心不公為己稍重雖是毫末必獨取於衆或衆有所分在已必欲多得其他心不能平遂啓爭端破蕩家産馴小得而致大患若知此理各懷公心取於私則皆取於私取於公則皆取於公衆有所分雖果實之屬直不數十金亦必均平則亦何爭之有兄弟子姪同居長者或恃長凌轢卑幼専用其財自取溫飽因而成私簿書出入不令幼者預知幼者至不免飢寒必啓爭端或長者處事至公幼者不能承順盜取其財以為不肖之資尤不能和若長者總提大綱幼者分幹細務長必幼謀幼必長聼各盡公心自然無爭兄弟子姪貧富厚薄不同富者既懷獨善之心又多驕傲貧者不生自勉之心又多妬嫉此所以不和若富者時分惠其餘不恤其不知恩貧者知自有定分不望其必分惠則亦何爭之有朝廷立法於分析一事非不委曲詳悉然有果是竊衆營私却於典買契中稱係妻財置到或詭名置産官中不能盡行根究又有果是起於貧寒不因祖父資産自能奮立營置財業或雖有祖衆財産不因於衆别自殖立私財其同宗之人必求分析至於經縣經州經所在官府纍十數年各至破蕩而後已若富者能反思果是因衆成私不分與貧者於心豈無所慊果是自置財産分與貧者明則為髙義幽則為隂德又豈不勝如連年爭訟妨廢家務必資備褁糧與囑託吏胥賄賂官員之徒費耶貧者亦宜自思彼實竊衆亦由辛苦營運以至增置豈可悉分有之况實彼之私財而吾欲受之寧不自愧苟能知此則所分雖微必無爭訟之費也人有兄弟子姪同居而私財獨厚慮有分析之患者則置金銀之屬而深藏之此為大愚若以百千金銀計之用以買産歲收必十千十餘年後所謂百千者我已取之其分與者皆其息也况百千又有息焉用以典質營運三年而其息一倍則所謂百千者我已取之其分與者皆其息也况又二年再倍不知其多少何為而藏之篋笥不假此收息以利衆也余見世人有將私財假於衆使之營家久而止取其夲者其家富厚均及兄弟子姪綿綿不絶此善處心之報也亦有竊盜衆財或寄妻家或寄內外姻親之家終為其人用過不敢取索及取索而不得者多矣亦有作妻家姻親之家置産為其人所掩有者多矣亦有作妻名置産身死而妻改嫁舉以自隨者亦多矣凡百君子幸詳鑒此止須存心兄弟同居甲者富厚常慮為乙所擾十數年間或甲破壞而乙乃增進或甲亡而其子不能自立乙反為甲所擾者有矣兄弟分析有幸應分人典賣而已欲執贖則將所分舊産邱邱假假平分或以兩旁分與應分人而已分處中往往應分人未賣而已分先賣反為應分人執鄰取贖者多矣有諸父俱亡作諸子均分而無兄弟者分後獨昌多兄弟者分後浸微者有多兄弟之人不願作諸子均分而兄弟各自昌盛勝於獨據全分者有以兄弟纍衆而已纍獨少力求分析而分後浸微反不若纍衆之人昌盛如故者有以分析不平屢經官求再分而分到財産隨即破壞反不若被論之人昌盛如故者世人若知智術不勝天理必不起爭訟之心兄弟義居固世之美事然其間有一人早亡諸父與子姪其愛稍疏其心未必均齊為長而欺瞞其幼者有之為幼而悖慢其長者有之顧見義居而交爭者其相疾有甚於路人前日之美事乃甚不美矣故兄弟當分宜早有所定兄弟相愛雖異居異財亦不害為孝義一有交爭則孝義何在兄弟子姪有同門異戶而居者於衆事宜各盡心不可令小兒婢僕有擾於衆雖是細微皆起爭之漸且衆之庭宇一人勤於掃灑一人全不知顧勤掃灑者已不能平况不知顧者又縱其小兒婢僕常常狼籍且不容他人禁止則怒詈失歡多起於此同居之人有不賢者非理以相擾若間或一再尚可與辨至於百無一是且朝夕以此相臨極為難處同鄉及同官亦或有此當寬其懷抱以無可奈何處之父之兄弟謂之伯父叔父其妻謂之伯母叔母服制減於父母一等者蓋謂其撫字教育有父母之道與親父母不相逺而兄弟之子謂之猶子亦謂其奉承報孝有子之道與親子不相逺故幼而無父母者苟有伯叔父母則不至於無所養老而無子孫者苟有猶子則不至於無所歸此聖王制禮立法之夲意今人或不然自愛其子而不顧兄弟之子又有因其無父母欲兼其財百端以擾害之何以責其猶子之孝故猶子亦視其伯叔父母如仇讎矣人有數子無所不愛而為兄弟則相視如仇讎往往其子因父之意遂不禮於伯父叔父者殊不知己之兄弟即父之諸子己之諸子即他日之兄弟我於兄弟不和則己之諸子更相視效能禁其不乖戾否子不禮於伯叔父則不孝於父亦其漸也故欲吾之諸子和同須以吾之處兄弟者示之欲吾子之孝於己須以其善事伯叔父者先之凡人之家有子弟及婦女好傳遞言語則雖謂舅姑伯叔妯娌皆假合強為之稱呼非自然天屬故輕於割恩易於修怨非丈夫有逺識則為其役而不自覺一家之中乖變生矣於是有親兄弟子姪隔屋連牆至死不相往來者有無子而不肯以猶子為後有多子而不以與其兄弟者有不恤兄弟之貧養親必欲如一寧棄親而不顧者有不恤兄弟之貧葬親必欲均費寧留喪而不葬者其事多端不可概述亦嘗見有逺識之人知婦女之不可諌誨而外與兄弟相愛常不失歡私救其所急私賙其所乏不使婦人知之彼兄弟之貧者雖深怨其婦女而重愛其兄弟至於當分析之際不敢以貧故而貪愛其兄弟之財産者蓋由是識髙逺之人不聼婦女之言而先施之厚因以得兄弟之心也婦女之易生言語者又多出於婢妾之間婢妾愚賤尤無見識以言他人之短失為忠於主母若婦女有見識能一切勿聼則虛佞之言不復敢進若聼之信之從而愛之則必再言之又言之使主母與人遂成深讎為婢妾者方洋洋得志非特婢妾為然僕𨽻亦多如此若主翁聼信則房族親戚故舊皆大失歡而善良之僕佃皆翻致誅責矣房族親戚鄰居其貧者才有所闕必請假焉雖米鹽酒醋計錢不多然朝夕頻頻令人厭煩如假借衣服器用既為損汚又因以質錢借之者歷歷在心日望其償其借者非惟不償又行行常自若且語人曰我未嘗有纎毫假貸於他此言一達豈不招怨怒一應親戚故舊有所假貸不若隨力給與之言借則我望其還不免有所索索之既頻而負償寃主反怒曰我欲償之以其不當頻索則姑已之方其不索則又曰彼不下氣問我我何為而強還之故索而不償不索亦不償終於交怨而後已蓋貧人之假貸初無肯償之意縱有肯償之意亦何由得償或假貸作經營又多以命窮計拙而折閲方其始借之時禮甚恭言甚遜其感恩之心可指日以為誓至他日責償之時恨不以兵刃相加凡親戚故舊因財成怨者多矣俗謂不孝怨父母欠債怨財主不若念其貧隨吾力之厚薄舉以與之則我無責償之念彼亦無怨於我子孫有過為父祖者多不自知貴宦尤甚蓋子孫有過多掩蔽父祖之耳目外人知之竊笑而已不使其父祖知之至於鄉曲貴宧人之進見有時稱道盛德之不暇豈敢言其子孫之非况又自以子孫為賢而以人言為誣故子孫有彌天之過而父祖不知也間有家訓稍嚴而母氏猶有庇其子之惡不使其父知之富家之子孫不肖不過耽酒好色賭博近小人破家之事而已貴宧之子孫不止此也其居鄉也強索人之酒食強貸人之錢財強借人之物而不還強買人之物而不償親近群小則使之假勢以淩人侵害善良則多致飾詞以妄訟鄉人有曲理犯法事認為己事名曰擔當鄉人有爭訟則偽作父祖之簡干懇州縣求以曲為直差夫借船放稅免罪以其所得為酒色之娛殆非一端也其隨侍也私令市賈買物私令吏人買物私託場務買物皆不償其直吏人補名吏人免罪吏人有優潤皆必責其報典賣婢妾限以低價而使他人填賠或同院子遊狎或干場務放稅其他妄有求覔亦非一端不恤誤其父祖陷于刑辟也凡為人父祖者宜知此事常關防更常詢訪或庶幾焉子弟有愚繆貪汚者自不可使之仕宧古人謂治獄多隂德子孫當有興者謂利人而人不知所自則得福今其愚繆必以獄訟事悉委胥輩改易事情庇惡陷善豈不與隂德相反古人又謂我多隂謀道家所忌謂害人而人不知所自則得禍今其貪汚必與胥輩同謀貨鬻公事以曲為直人受其寃無所告訴豈不謂之隂謀士大夫試歷數鄉曲三十年前宧族今能自存者僅有幾家皆前事所致也有逺識者必信此言同居父兄子弟善惡賢否相半若頑狠刻薄不惜家業之人先死則其家興盛未易量也若慈善長厚勤謹之人先死則其家不可救矣諺云莫言家未成成家子未生莫言家未破破家子未大亦此意也貧者養他人之子當於幼時蓋貧者無田宅可養暮年惟望其子反哺不可不自其幼時衣食撫養以結其心富者養他人之子當於既長之時今世之富人養他人之子多以為諱故欲及其無知之時撫養或養所出至微之人長而不肖恐其破家方議逐去致其爭訟若取於既長之時其賢否可以粗見苟能溫淳守己必能事所養如所生且不致破家亦不致興訟也多子固為人之患不可以多子之故輕以與人須俟其稍長見其溫淳守己舉以與人兩家獲福如在襁褓即以與人萬一不肖既破他家必求歸宗往往興訟又破我家則兩家受其禍矣養異姓之子非惟祖先神靈不歆其祀數世之後必與同姓通婚姻者律禁甚嚴人多冒之至啓爭端設或人不之告官不之治豈可不思理之所在江西養子不去其所生之姓而以所養之姓冠于其上若復姓者雖于經律無見亦知惡其無别如此同姓之子昭穆不順亦不可以為後鴻鴈微物猶不亂行人乃不然至於叔拜姪於理安乎况啓爭端設不得已養弟養姪孫以奉祭祀惟當撫之如子以其財産與之受所養者奉所養如父如古人為嫂制服如今人為祖承重之意而昭穆不亂亦無害也别宅子遺腹子宜及早收養教訓免致身後論訟或已習為愚下之人方欲歸宗尤難處也女亦然或與雜濫之人通私或婢妾因他事逐去皆不可不於生前早有辨明恐身後有求歸宗而暗昧不明子孫被其害者世有養孤遺子者及長使為僧道乃從其姓用其三代有族人出家而借用有蔭人三代此雖無甚利害然有還俗求歸宗者官以文書為驗則不可指為非此不可不防微也賢德之人見族人及外親子弟之貧多收於其家衣食教撫如已子而薄俗乃有貪其財産於其身後強欲承重以為某人嘗以我為嗣矣故高義之事使人病於難行惟當於平昔别其居處明其名稱若已嗣未立或他人之子弟年居己子之長尤不可不明嫌疑於平昔也娶妻而有前夫之子接腳夫而有前妻之子欲撫養不欲撫養尤不可不早定以息他日之爭同入門及不同入門同居及不同居當質之於衆明之於官以絶爭端若義子有勞於家亦宜早有所酬義兄弟有勞有恩亦宜割財産與之不可拘文而盡廢恩義也寡婦再嫁或有孤女年未及嫁如內外親姻有髙義者寧若與之議親使鞠養於舅姑之家俟其長而成親若隨母而歸義父之家則嫌疑之間多不自明中年以後喪妻乃人之大不幸幼子幼女無與之撫存飲食衣服凡闔門之事無與之料理則難於不娶娶在室之人則少艾之心非中年以後之人所能御娶寡居之人或是不能安其室者亦不易制兼有前夫之子不能忘情或有親生之子豈免二心故中年再娶為尤難然婦人賢淑自守和睦如一者不為無人特難值耳婦人不預外事者蓋謂夫與子既賢外事自不必預若夫與子不肖掩蔽婦人之耳目何所不至今人多有遊蕩賭博至於鬻田園甚至於鬻其所居妻猶不覺然則夫之不賢而欲求預外事何益也子之鬻産必同其母而偽書契字者有之重息以假貸而兼并之人不憚於論訟貸茶鹽以轉貨而官司責其必償為母者終不能制然則子之不賢而欲求預外事何益也此乃婦人之不幸為之將奈何苟為夫能念其妻之可憐為子能念其母之可憐頓然悔悟豈不甚善婦人有以其夫蠢懦而能自理家務計算錢穀出入不能欺者有夫不肖而能與其子同理家務不致破蕩家産者有夫死子幼而能教養其子敦睦內外姻親料理家務至於興隆者皆賢婦人也而夫死子幼居家營生最為難事託之宗族宗族未必賢託之親戚親戚未必賢賢者又不肯預人家事惟婦人自識書算而所託之人衣食自給稍識公義則庶幾焉不然鮮不破家人之男女不可於幼小之時便議婚姻大抵女欲得託男欲得偶若論目前悔必在後蓋富貴盛衰更迭不常男女之賢否須年長乃可見若早議婚姻事無變易固為甚善或昔富而今貧或昔貴而今賤或所議之壻流蕩不肖或所議之女狠戾不檢從其前約則難保家背其前約則為薄義而爭訟由之以興可不戒哉男女議親不可貪其閥閲之高資産之厚苟人物不相當則子女終身抱恨况又不和而生他事者乎有男雖欲擇婦有女雖欲擇壻又須自量我家子女如何如我子愚癡庸下若娶美婦豈特不和或有他事如我女醜拙狠妬若嫁美壻萬一不和卒為其棄出者有之凡嫁娶因非偶而不和者父母不審之罪也古人謂周人惡媒以其言語反覆紿女家則曰男富紿男家則曰女美近世尤甚紿女家則曰男家不求備禮且助出嫁遣之資紿男家則厚許其所遷之賄且虛指數目若輕信其言而成婚則責恨見欺夫妻反目至於仳離者有之大抵嫁娶固不可無媒而媒者之言不可盡信如此宜謹察於始人之議親多要因親及親以示不相忘此最風俗好處然其間婦女無逺識多因相熟而相簡至於相忽遂至於相爭而不和反不若素不相識而驟議親者故凡因親議親最不可託熟闕其禮文又不可忘其夲意極於責備則兩家周緻無他患矣故有姪女嫁於姑家獨為姑氏所惡甥女嫁於舅家獨為舅妻所惡姨女嫁於姨家獨為姨氏所惡皆由玩易於其初禮薄而怨生又有不審於其初之過者嫁女須隨家力不可勉強然或財産寬餘亦不可視為他人不以分給今世固有生男不得力而依託女家及身後葬祭皆由女子者豈可謂生女之不如男也大抵女子之心最為可憐母家富而夫家貧則欲得母家之財以與夫家夫家富而母家貧則欲得夫家之財以與母家為父母及夫者宜憐而稍從之及其男女嫁娶之後男家富而女家貧則欲得男家之財以與女家女家富而男家貧則欲得女家之財以與男家為男女者亦宜憐而稍從之若或割貧益富此為非宜不從可也人言光景百年七十者稀為其倐忽易過而命窮之人晚景最不易過大率五十嵗前過二十年如十年五十嵗後過十年不啻二十年而婦人之享高年者尤為難過大率婦人依人而立其未嫁之前有好祖不如有好父有好父不如有好兄弟有好兄弟不如有好姪其既嫁之後有好翁不如有好夫有好夫不如有好子有好子不如有好孫故婦人多有少壯享富貴而暮年無聊者蓋由此也凡其親戚所宜矜念人之姑姨姊妹及親戚婦人年老而子孫不肖不能供養者不可不收養然又須關防恐其身故之後其不肖子孫却妄經官司稱其人因飢寒而死或稱其人有遺下囊篋之物官中受其牒必為追證不免有擾須於生前令白之於衆質之於官稱身外無餘物則免他患大抵要為髙義之事須令無後患父母髙年怠於管幹多將財産均給子孫若父祖出於公心初無偏曲子孫各能戮力不事遊蕩則均給之後既無爭訟必至興隆若父祖緣有過房之子緣有前母後母之子緣有子亡而不愛其孫又有雖是一等子孫自有憎愛凡衣食財物所及必有厚薄致令子孫力求均給其父祖又於其中暗有輕重安得不起他日爭端若父祖緣其子孫內有不肖之人慮其侵害他房不得已而均給者止可逐時均給財穀不可均給田産若均給田産彼以為已分所有必邀求尊長立契典賣典賣既盡窺覷他房從而婪取必至興訟使賢子賢孫被其擾害同於破蕩不可不思大抵人之子孫或十數人皆能守己其中有一不肖則十數均受其害至於破家者有之國家法令百端終不能禁父祖智謀百端終不能防欲延家祚者鑒他家之已往思我家之未來可不修德熟慮以為長久之計耶遺囑之文皆賢明之人為身後之慮然亦須公平乃可以保家如劫於悍妻黠妾因於後妻愛子中有偏曲厚薄或妄立嗣或妄逐子不近人情之事不可勝數皆所以興訟破家也父祖有慮子孫爭訟者常欲預為遺囑之文而不知風燭不常因循不決至於疾病危篤雖中心尚了然而口不能言手不能動飲恨而死者多矣况有神識昏亂者乎置義莊以濟貧族族久必衆不惟所得漸微不肖子弟得之不以濟飢寒或為一醉之適或為一擲之娛至有以其合得劵契預質於人而所得不及其半者此為何益若其所得之多飽食終日無所用心擾暴鄉曲紊煩官司而已不若以其田置義學能為儒者擇師訓之既為之食且有以周其困乏亦不至生事擾人紊煩官司也
